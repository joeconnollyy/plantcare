<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Plant-Care Pro</title>

<style>
:root {
  --osrs-gold: #c8a04a;
  --osrs-gold-light: #e8c870;
  --osrs-brown-dark: #2a1f0e;
  --osrs-panel: #1e1608;
  --osrs-border: #6b4c1e;
  --osrs-text: #e8d8a0;
  --osrs-hp-green: #00b050;
  --osrs-hp-yellow: #ffcc00;
  --osrs-hp-red: #e84118;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #1a0e04;
  color: var(--osrs-text);
  font-family: 'Segoe UI', sans-serif;
}

.app-shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

.app-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
}

.bottom-nav {
  display: flex;
  background: #1a0e04;
  border-top: 2px solid var(--osrs-border);
  padding-bottom: calc(var(--safe-bottom) + 6px);
}

.nav-tab {
  flex: 1;
  text-align: center;
  padding: 12px 4px;
  font-size: 14px;
  color: #806030;
  border: none;
  background: none;
}
.nav-tab.active {
  color: var(--osrs-gold);
}

.nav-icon {
  font-size: 26px; /* BIGGER */
  display: block;
}

.panel { display: none; }
.panel.active { display: block; }

.panel-heading {
  font-size: 18px;
  margin-bottom: 10px;
  color: var(--osrs-gold);
}

.plant-card {
  background: var(--osrs-brown-dark);
  border: 1px solid var(--osrs-border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 12px;
}

.plant-name {
  font-size: 18px;
  font-weight: bold;
}

.bar {
  height: 14px; /* BIGGER */
  margin: 6px 0;
  background: #000;
  border-radius: 3px;
}

.fill { height: 100%; }
.green { background: var(--osrs-hp-green); }
.yellow { background: var(--osrs-hp-yellow); }
.red { background: var(--osrs-hp-red); }

.btn {
  padding: 10px;
  margin-top: 6px;
  font-size: 14px;
  border-radius: 4px;
  background: var(--osrs-panel);
  border: 1px solid var(--osrs-border);
  color: var(--osrs-text);
  cursor: pointer;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="app-shell">

<div class="app-body">

<div class="panel active" id="panel-garden">
  <div id="plant-list"></div>
</div>

<div class="panel" id="panel-add">
  <div class="panel-heading">Add Plant</div>
  <input id="f-name" placeholder="Plant name">
  <button class="btn" onclick="addPlant()">➕ Add Plant</button>
</div>

<div class="panel" id="panel-stats">
  <div class="panel-heading">Stats</div>
  XP: <span id="xp"></span>
</div>

<div class="panel" id="panel-log">
  <div class="panel-heading">Log</div>
  <div id="log"></div>
</div>

</div>

<div class="bottom-nav">
  <button class="nav-tab active" onclick="switchPanel('garden', this)">
    <span class="nav-icon">🌿</span>Garden
  </button>
  <button class="nav-tab" onclick="switchPanel('add', this)">
    <span class="nav-icon">➕</span>Add
  </button>
  <button class="nav-tab" onclick="switchPanel('stats', this)">
    <span class="nav-icon">📊</span>Stats
  </button>
  <button class="nav-tab" onclick="switchPanel('log', this)">
    <span class="nav-icon">📜</span>Log
  </button>
</div>

</div>

<script>
(function(){

let S = { plants: [], xp: 0, log: [] };

function save(){ localStorage.setItem("pcp", JSON.stringify(S)); }
function load(){ const d = localStorage.getItem("pcp"); if(d) S = JSON.parse(d); }

function today(){ return new Date().toISOString().split('T')[0]; }
function days(d){ return Math.floor((Date.now() - new Date(d)) / 86400000); }

function hp(p){ return Math.max(0, 100 - days(p.watered)*10); }
function hpColor(v){ return v>60?"green":v>30?"yellow":"red"; }

function render(){
  const list = document.getElementById("plant-list");

  if(!S.plants.length){
    list.innerHTML = "<p>No plants yet 🌱</p>";
  } else {
    list.innerHTML = S.plants.map((p,i)=>{
      const h = hp(p);
      return "<div class='plant-card'>"
      +"<div class='plant-name'>"+p.name+"</div>"
      +"<div class='bar'><div class='fill "+hpColor(h)+"' style='width:"+h+"%'></div></div>"
      +"<button class='btn' onclick='water("+i+")'>💧 Water</button>"
      +"<button class='btn' onclick='removePlant("+i+")'>🗑 Remove</button>"
      +"</div>";
    }).join("");
  }

  document.getElementById("xp").textContent = S.xp;
  document.getElementById("log").innerHTML = S.log.map(l=>"<div>"+l+"</div>").join("");

  save();
}

window.addPlant = function(){
  const el = document.getElementById("f-name");
  if(!el.value.trim()) return;

  S.plants.push({ name: el.value, watered: today() });
  S.xp += 10;
  S.log.unshift("Added "+el.value);

  el.value="";
  render();
};

window.water = function(i){
  S.plants[i].watered = today();
  S.xp += 5;
  S.log.unshift("Watered "+S.plants[i].name);
  render();
};

window.removePlant = function(i){
  S.log.unshift("Removed "+S.plants[i].name);
  S.plants.splice(i,1);
  render();
};

window.switchPanel = function(id, btn){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));

  document.getElementById("panel-"+id).classList.add("active");
  btn.classList.add("active");
};

window.addEventListener("DOMContentLoaded", ()=>{
  load();
  render();
});

})();
</script>

</body>
</html>
