<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Plant-Care Pro" />
  <meta name="theme-color" content="#1e1608" />
  <title>Plant-Care Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --osrs-gold: #c8a04a;
      --osrs-gold-light: #e8c870;
      --osrs-brown-dark: #2a1f0e;
      --osrs-brown-mid: #3d2e14;
      --osrs-brown-light: #5a4020;
      --osrs-panel: #1e1608;
      --osrs-border: #6b4c1e;
      --osrs-text: #e8d8a0;
      --osrs-hp-green: #00b050;
      --osrs-hp-yellow: #ffcc00;
      --osrs-hp-red: #e84118;
      --osrs-xp: #ff6b35;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--osrs-panel);
      color: var(--osrs-text);
      font-family: 'Share Tech Mono', monospace;
      -webkit-font-smoothing: antialiased;
      /* Reduced base font size by 10% */
      font-size: 90%; 
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .osrs-header {
      flex-shrink: 0;
      background: #1a0e04;
      border-bottom: 2px solid var(--osrs-border);
      padding: calc(var(--safe-top) + 10px) 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .osrs-logo {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      font-size: 1.5rem; /* Scaled down */
      color: var(--osrs-gold);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-chips { display: flex; gap: 6px; }

    .chip {
      background: var(--osrs-brown-dark);
      border: 1px solid var(--osrs-border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.85rem;
      color: var(--osrs-gold-light);
    }

    .app-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      background: #1a0e04;
      border-top: 2px solid var(--osrs-border);
      padding-bottom: var(--safe-bottom);
      position: relative;
      z-index: 10;
    }

    /* Fixed the bottom bar issue by ensuring the color fills the safe area */
    .bottom-nav::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 100px;
      background: #1a0e04;
    }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px;
      background: transparent;
      border: none;
      color: #806030;
      font-size: 0.75rem; /* Scaled down */
    }

    .nav-tab .nav-icon { font-size: 1.5rem; margin-bottom: 2px; } /* Scaled down icons */
    .nav-tab.active { color: var(--osrs-gold); }

    .panel { display: none; padding: 12px; }
    .panel.active { display: block; }

    .plant-card {
      background: var(--osrs-brown-dark);
      border: 1px solid var(--osrs-border);
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .plant-emoji { font-size: 2.5rem; flex-shrink: 0; } /* Scaled down icons */

    .btn {
      flex: 1;
      padding: 10px 4px;
      font-size: 0.9rem;
      background: var(--osrs-panel);
      border: 1px solid var(--osrs-border);
      color: var(--osrs-gold-light);
      border-radius: 3px;
    }

    .xp-toast {
      position: fixed;
      top: calc(var(--safe-top) + 60px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--osrs-brown-dark);
      border: 1px solid var(--osrs-gold);
      padding: 8px 16px;
      color: var(--osrs-xp);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .xp-toast.show { opacity: 1; }

    .nav-badge {
      position: absolute;
      top: 5px;
      right: calc(50% - 18px);
      background: var(--osrs-hp-red);
      font-size: 0.65rem;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="osrs-header">
    <div class="osrs-logo">🌿 Plant-Care Pro</div>
    <div class="header-chips">
      <div class="chip">XP: <b id="hdr-xp">0</b></div>
      <div class="chip">Plants: <b id="hdr-count">0</b></div>
    </div>
  </div>

  <div class="xp-toast" id="xp-toast"></div>

  <div class="app-body" id="app-body">
    <div class="panel active" id="panel-garden">
      <div id="plant-list"></div>
    </div>

    <div class="panel" id="panel-add">
      <h3 style="color:var(--osrs-gold); margin-bottom:10px;">Add New Plant</h3>
      <input type="text" id="f-name" class="btn" style="width:100%; text-align:left; margin-bottom:10px;" placeholder="Plant Name">
      <select id="f-species" class="btn" style="width:100%; text-align:left; margin-bottom:10px;">
        <option value="Monstera deliciosa">🌿 Monstera</option>
        <option value="Epipremnum aureum">🍃 Pothos</option>
        <option value="Custom">🌺 Other</option>
      </select>
      <button class="btn" style="width:100%; background:var(--osrs-brown-mid);" onclick="addPlant()">➕ Plant Seed</button>
    </div>

    <div class="panel" id="panel-stats"><h3>Stats</h3><div id="s-total">0</div></div>
    <div class="panel" id="panel-log"><div id="log-list"></div></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" onclick="switchPanel('garden', this)">
      <div class="nav-icon">🌿</div><span>Garden</span>
      <div class="nav-badge" id="alert-badge" style="display:none"></div>
    </button>
    <button class="nav-tab" onclick="switchPanel('add', this)"><div class="nav-icon">➕</div><span>Add</span></button>
    <button class="nav-tab" onclick="switchPanel('stats', this)"><div class="nav-icon">📊</div><span>Stats</span></button>
    <button class="nav-tab" onclick="switchPanel('log', this)"><div class="nav-icon">📜</div><span>Log</span></button>
  </div>
</div>

<script>
(function () {
  const EMOJI = { 'Monstera deliciosa': '🌿', 'Epipremnum aureum': '🍃', 'Custom': '🌺' };
  let S = { plants: [], totalXp: 0, waterXp: 0, fertXp: 0, hortXp: 0, tasksDone: 0, log: [] };
  
  try { const d = localStorage.getItem('pcp2'); if (d) S = JSON.parse(d); } catch (e) {}

  function save() { localStorage.setItem('pcp2', JSON.stringify(S)); }
  function today() { return new Date().toISOString().split('T')[0]; }

  window.toast = function(msg) {
    const t = document.getElementById('xp-toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };

  window.addPlant = function () {
    const name = document.getElementById('f-name').value;
    if (!name) return;
    S.plants.push({ name, species: document.getElementById('f-species').value, level: 1, lastWatered: today() });
    S.totalXp += 10;
    toast("🌿 Planted! +10 XP");
    renderAll();
  };

  window.doWater = function(i) {
    S.plants[i].level++; S.totalXp += 25;
    toast("💧 Watered! +25 XP");
    renderAll();
  };

  window.switchPanel = function (id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
  };

  function renderAll() {
    const list = document.getElementById('plant-list');
    list.innerHTML = S.plants.map((p, i) => `
      <div class="plant-card">
        <div style="display:flex; gap:10px; align-items:center;">
          <div class="plant-emoji">${EMOJI[p.species] || '🌱'}</div>
          <div><b>${p.name}</b><br><small>Lv.${p.level}</small></div>
          <button class="btn" onclick="doWater(${i})">💧 Water</button>
        </div>
      </div>
    `).join('');
    document.getElementById('hdr-xp').textContent = S.totalXp;
    document.getElementById('hdr-count').textContent = S.plants.length;
    save();
  }

  renderAll();
})();
</script>
</body>
</html>
