<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Plant-Care Pro" />
  <meta name="theme-color" content="#1a0e04" /> <title>Plant-Care Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --osrs-gold: #c8a04a;
      --osrs-gold-light: #e8c870;
      --osrs-brown-dark: #2a1f0e;
      --osrs-brown-mid: #3d2e14;
      --osrs-brown-light: #5a4020;
      --osrs-panel: #1e1608;
      --osrs-border: #6b4c1e;
      --osrs-text: #e8d8a0;
      --osrs-hp-green: #00b050;
      --osrs-hp-yellow: #ffcc00;
      --osrs-hp-red: #e84118;
      --osrs-xp: #ff6b35;
      --nav-bg: #1a0e04;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      /* Set background to match nav to hide safe-area seams on iPhone */
      background: var(--nav-bg); 
      color: var(--osrs-text);
      font-family: 'Share Tech Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: var(--osrs-panel); /* Main content area background */
    }

    .osrs-header {
      flex-shrink: 0;
      background: var(--nav-bg);
      border-bottom: 2px solid var(--osrs-border);
      padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .osrs-logo {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      font-size: 24px;
      color: var(--osrs-gold);
    }

    .header-chips { display: flex; gap: 6px; }
    .chip {
      background: var(--osrs-brown-dark);
      border: 1px solid var(--osrs-border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 14px;
      color: var(--osrs-gold-light);
    }

    .app-body {
      flex: 1;
      overflow-y: auto;
      background: var(--osrs-panel);
      -webkit-overflow-scrolling: touch;
    }

    /* ── Fixed Bottom Nav for iPhone ── */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      background: var(--nav-bg);
      border-top: 2px solid var(--osrs-border);
      /* This handles the space for the iPhone home bar */
      padding-bottom: env(safe-area-inset-bottom, 12px); 
      padding-top: 8px;
    }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      color: #806030;
      font-family: 'Share Tech Mono', monospace;
      cursor: pointer;
    }

    .nav-tab.active { color: var(--osrs-gold); }
    .nav-icon { font-size: 24px; }
    .nav-tab span { font-size: 12px; margin-top: 2px; }

    /* ── UI Panels ── */
    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }
    .panel-heading { font-family: 'Crimson Pro', serif; font-size: 20px; color: var(--osrs-gold); border-bottom: 1px solid var(--osrs-border); margin-bottom: 15px; padding-bottom: 5px; }

    /* ── Cards & Elements (Existing styles kept) ── */
    .plant-card { background: var(--osrs-brown-dark); border: 1px solid var(--osrs-border); padding: 14px; border-radius: 4px; margin-bottom: 12px; }
    .bar-row { margin-bottom: 8px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 13px; color: #a08040; margin-bottom: 3px; }
    .bar-bg { background: #111; height: 16px; border: 1px solid #000; border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; transition: width 0.4s; }
    .hp-high { background: var(--osrs-hp-green); }
    .hp-mid { background: var(--osrs-hp-yellow); }
    .hp-low { background: var(--osrs-hp-red); }
    .water-fill { background: #1e88e5; }
    .fert-fill { background: #7b5e2a; }

    .card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn { flex: 1; padding: 10px; background: var(--osrs-panel); border: 1px solid var(--osrs-border); color: var(--osrs-gold-light); font-family: 'Share Tech Mono'; cursor: pointer; }
    .btn:active { background: var(--osrs-brown-mid); }
    .btn.del { flex: 0 0 45px; color: #e84118; }

    /* Forms */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 12px; color: var(--osrs-gold); margin-bottom: 4px; }
    .form-input, .form-select { width: 100%; background: var(--osrs-brown-dark); border: 1px solid var(--osrs-border); color: #fff; padding: 10px; font-family: 'Share Tech Mono'; }
    .submit-btn { width: 100%; padding: 15px; background: var(--osrs-brown-mid); border: 1px solid var(--osrs-gold); color: var(--osrs-gold); font-weight: bold; margin-top: 10px; }

    .xp-toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--osrs-gold); padding: 8px 16px; color: var(--osrs-xp); opacity: 0; transition: 0.3s; pointer-events: none; }
    .xp-toast.show { opacity: 1; }
    .nav-badge { position: absolute; top: 0; right: 20%; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="osrs-header">
    <div class="osrs-logo">🌿 Plant-Care Pro</div>
    <div class="header-chips">
      <div class="chip">XP: <b id="hdr-xp">0</b></div>
      <div class="chip">Plants: <b id="hdr-count">0</b></div>
    </div>
  </div>

  <div class="xp-toast" id="xp-toast"></div>

  <div class="app-body" id="app-body">
    <div class="panel active" id="panel-garden">
      <div id="plant-list"></div>
    </div>

    <div class="panel" id="panel-add">
      <div class="panel-heading">Add New Plant</div>
      <div class="form-group">
        <label class="form-label">Plant Name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Bob the Fern" />
      </div>
      <div class="form-group">
        <label class="form-label">Species</label>
        <select class="form-select" id="f-species">
          <option value="Monstera deliciosa">🌿 Monstera</option>
          <option value="Epipremnum aureum">🍃 Pothos</option>
          <option value="Cactaceae">🌵 Cactus</option>
          <option value="Custom">🌺 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Water Every (Days)</label>
        <input class="form-input" id="f-water" type="number" value="7" />
      </div>
      <div class="form-group">
        <label class="form-label">Fertilise Every (Days)</label>
        <input class="form-input" id="f-fert" type="number" value="30" />
      </div>
      <button class="submit-btn" onclick="addPlant()">➕ Plant Seed</button>
    </div>

    <div class="panel" id="panel-stats"><div class="panel-heading">Farming Stats</div><div id="stats-content"></div></div>
    <div class="panel" id="panel-log"><div class="panel-heading">Activity Log</div><div id="log-list"></div></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" onclick="switchPanel('garden', this)">
      <div class="nav-icon">🌿</div><span>Garden</span>
      <div id="alert-badge" class="nav-badge" style="display:none"></div>
    </button>
    <button class="nav-tab" onclick="switchPanel('add', this)">
      <div class="nav-icon">➕</div><span>Add</span>
    </button>
    <button class="nav-tab" onclick="switchPanel('stats', this)">
      <div class="nav-icon">📊</div><span>Stats</span>
    </button>
    <button class="nav-tab" onclick="switchPanel('log', this)">
      <div class="nav-icon">📜</div><span>Log</span>
    </button>
  </div>
</div>

<script>
(function () {
  const EMOJI = { 'Monstera deliciosa': '🌿', 'Epipremnum aureum': '🍃', 'Cactaceae': '🌵', 'Custom': '🌺' };
  let S = { plants: [], totalXp: 0, log: [] };
  
  try { const d = localStorage.getItem('pcp_v2'); if (d) S = JSON.parse(d); } catch (e) {}

  function save() { localStorage.setItem('pcp_v2', JSON.stringify(S)); }
  function today() { return new Date().toISOString().split('T')[0]; }
  function daysSince(ds) { return Math.floor((Date.now() - new Date(ds).getTime()) / 86400000); }

  function renderGarden() {
    const list = document.getElementById('plant-list');
    if (!S.plants.length) {
      list.innerHTML = '<p style="text-align:center; padding-top:40px; opacity:0.5">Garden is empty.</p>';
      return;
    }
    list.innerHTML = S.plants.map((p, i) => {
      const dsW = daysSince(p.lastW);
      const dsF = daysSince(p.lastF);
      const wPct = Math.max(0, 100 - Math.round((dsW / p.waterEvery) * 100));
      const fPct = Math.max(0, 100 - Math.round((dsF / p.fertEvery) * 100));
      const hp = Math.round((wPct + fPct) / 2);

      return `
        <div class="plant-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px">
            <span style="font-size:24px">${EMOJI[p.species] || '🌱'} <b>${p.name}</b></span>
            <span style="color:var(--osrs-gold)">Lv.${p.level}</span>
          </div>
          <div class="bar-row">
            <div class="bar-label"><span>Health</span><span>${hp}%</span></div>
            <div class="bar-bg"><div class="bar-fill ${hp > 60 ? 'hp-high' : 'hp-low'}" style="width:${hp}%"></div></div>
          </div>
          <div class="bar-row">
            <div class="bar-label"><span>Water</span><span>${wPct}%</span></div>
            <div class="bar-bg"><div class="bar-fill water-fill" style="width:${wPct}%"></div></div>
          </div>
          <div class="card-actions">
            <button class="btn" onclick="doAction(${i}, 'water')">💧 Water</button>
            <button class="btn" onclick="doAction(${i}, 'fert')">🌱 Fertilise</button>
            <button class="btn del" onclick="removePlant(${i})">🗑</button>
          </div>
        </div>`;
    }).join('');
    document.getElementById('hdr-xp').textContent = S.totalXp;
    document.getElementById('hdr-count').textContent = S.plants.length;
  }

  window.switchPanel = function(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
  };

  window.addPlant = function() {
    const name = document.getElementById('f-name').value;
    if(!name) return;
    S.plants.push({
      name, species: document.getElementById('f-species').value,
      waterEvery: parseInt(document.getElementById('f-water').value),
      fertEvery: parseInt(document.getElementById('f-fert').value),
      lastW: today(), lastF: today(), level: 1
    });
    save(); renderGarden();
    switchPanel('garden', document.querySelector('.nav-tab'));
  };

  window.doAction = function(i, type) {
    const p = S.plants[i];
    if (type === 'water') p.lastW = today();
    else p.lastF = today();
    p.level++;
    S.totalXp += 50;
    save(); renderGarden();
    const t = document.getElementById('xp-toast');
    t.textContent = `+50 XP!`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };

  window.removePlant = function(i) {
    if(confirm('Remove plant?')) { S.plants.splice(i,1); save(); renderGarden(); }
  };

  renderGarden();
})();
</script>
</body>
</html>
