<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Plant-Care Pro</title>

<style>
:root {
  --osrs-gold: #c8a04a;
  --osrs-brown-dark: #2a1f0e;
  --osrs-panel: #1e1608;
  --osrs-border: #6b4c1e;
  --osrs-text: #e8d8a0;
  --osrs-hp-green: #00b050;
  --osrs-hp-yellow: #ffcc00;
  --osrs-hp-red: #e84118;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #1a0e04;
  color: var(--osrs-text);
  font-family: monospace;
}

.app-shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  background: #1a0e04;
}

.app-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.bottom-nav {
  display: flex;
  background: #1a0e04;
  border-top: 2px solid var(--osrs-border);
  padding-bottom: calc(var(--safe-bottom) + 4px);
}

.nav-tab {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  color: #806030;
  cursor: pointer;
}
.nav-tab.active { color: var(--osrs-gold); }

.panel { display: none; padding: 12px; }
.panel.active { display: block; }

.plant-card {
  background: var(--osrs-brown-dark);
  border: 1px solid var(--osrs-border);
  padding: 10px;
  margin-bottom: 10px;
}

.bar {
  height: 10px;
  margin: 4px 0;
  background: #000;
}
.fill {
  height: 100%;
}
.green { background: var(--osrs-hp-green); }
.yellow { background: var(--osrs-hp-yellow); }
.red { background: var(--osrs-hp-red); }

.btn {
  margin-top: 5px;
  padding: 6px;
  background: var(--osrs-panel);
  border: 1px solid var(--osrs-border);
  color: var(--osrs-text);
  cursor: pointer;
}
</style>
</head>

<body>
<div class="app-shell">

<div class="app-body">

<!-- Garden -->
<div class="panel active" id="panel-garden">
  <div id="plant-list"></div>
</div>

<!-- Add -->
<div class="panel" id="panel-add">
  <input id="f-name" placeholder="Plant name"><br><br>
  <button onclick="addPlant()">Add Plant</button>
</div>

<!-- Stats -->
<div class="panel" id="panel-stats">
  <div>Total XP: <span id="s-xp">0</span></div>
</div>

<!-- Log -->
<div class="panel" id="panel-log">
  <div id="log"></div>
</div>

</div>

<div class="bottom-nav">
  <button class="nav-tab active" onclick="switchPanel('garden', this)">🌿</button>
  <button class="nav-tab" onclick="switchPanel('add', this)">➕</button>
  <button class="nav-tab" onclick="switchPanel('stats', this)">📊</button>
  <button class="nav-tab" onclick="switchPanel('log', this)">📜</button>
</div>

</div>

<script>
(function () {

let S = {
  plants: [],
  xp: 0,
  log: []
};

function save() {
  localStorage.setItem('plants-v2', JSON.stringify(S));
}

function load() {
  const d = localStorage.getItem('plants-v2');
  if (d) S = JSON.parse(d);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function daysSince(d) {
  return Math.floor((Date.now() - new Date(d)) / 86400000);
}

function hp(p) {
  return Math.max(0, 100 - daysSince(p.watered) * 10);
}

function hpColor(v) {
  return v > 60 ? "green" : v > 30 ? "yellow" : "red";
}

function renderGarden() {
  const list = document.getElementById('plant-list');
  if (!list) return;

  if (!S.plants.length) {
    list.innerHTML = "<div>No plants 🌱</div>";
    return;
  }

  let html = "";

  S.plants.forEach((p, i) => {
    const h = hp(p);

    html += "<div class='plant-card'>";
    html += "<b>" + p.name + "</b>";
    html += "<div class='bar'><div class='fill " + hpColor(h) + "' style='width:" + h + "%'></div></div>";
    html += "<button class='btn' onclick='water(" + i + ")'>💧</button>";
    html += "<button class='btn' onclick='removePlant(" + i + ")'>🗑</button>";
    html += "</div>";
  });

  list.innerHTML = html;
}

function renderStats() {
  document.getElementById("s-xp").textContent = S.xp;
}

function renderLog() {
  const el = document.getElementById("log");
  el.innerHTML = S.log.map(l => "<div>" + l + "</div>").join("");
}

function renderAll() {
  renderGarden();
  renderStats();
  renderLog();
  save();
}

window.addPlant = function () {
  const input = document.getElementById("f-name");
  if (!input.value.trim()) return;

  S.plants.push({
    name: input.value,
    watered: today()
  });

  S.xp += 10;
  S.log.unshift("Added " + input.value);

  input.value = "";
  renderAll();
};

window.water = function (i) {
  S.plants[i].watered = today();
  S.xp += 5;
  S.log.unshift("Watered " + S.plants[i].name);
  renderAll();
};

window.removePlant = function (i) {
  S.log.unshift("Removed " + S.plants[i].name);
  S.plants.splice(i, 1);
  renderAll();
};

window.switchPanel = function (id, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));

  document.getElementById("panel-" + id).classList.add("active");
  btn.classList.add("active");
};

window.addEventListener("DOMContentLoaded", () => {
  load();
  renderAll();
});

})();
</script>

</body>
</html>
