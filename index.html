<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Plant-Care Pro</title>

<style>
:root {
  --osrs-gold: #c8a04a;
  --osrs-brown-dark: #2a1f0e;
  --osrs-panel: #1e1608;
  --osrs-border: #6b4c1e;
  --osrs-text: #e8d8a0;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  margin: 0;
  height: 100%;
  background: #1a0e04; /* FIXED */
  color: var(--osrs-text);
  font-family: monospace;
}

.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #1a0e04; /* FIXED */
}

.app-body {
  flex: 1;
  overflow-y: auto;
}

.bottom-nav {
  display: flex;
  background: #1a0e04;
  border-top: 2px solid var(--osrs-border);
  padding-bottom: calc(var(--safe-bottom) + 4px); /* FIXED */
}

.panel { display: none; padding: 12px; }
.panel.active { display: block; }

.btn {
  padding: 10px;
  border: 1px solid var(--osrs-border);
  background: var(--osrs-panel);
  color: var(--osrs-text);
  cursor: pointer;
}
</style>
</head>

<body>
<div class="app-shell">

<div class="app-body" id="app-body">
  <div class="panel active" id="panel-garden">
    <div id="plant-list"></div>
  </div>

  <div class="panel" id="panel-add">
    <input id="f-name" placeholder="Plant name">
    <button onclick="addPlant()">Add</button>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="switchPanel('garden')">Garden</button>
  <button onclick="switchPanel('add')">Add</button>
</div>

</div>

<script>
(function () {

let S = { plants: [] };

function save() {
  localStorage.setItem('plants', JSON.stringify(S));
}

function load() {
  const d = localStorage.getItem('plants');
  if (d) S = JSON.parse(d);
}

function renderGarden() {
  const list = document.getElementById('plant-list');

  if (!list) return;

  if (!S.plants.length) {
    list.innerHTML =
      '<div>No plants yet. Add one 🌱</div>'; // CLEAN STRING (no backticks)
    return;
  }

  list.innerHTML = S.plants.map((p, i) => {
    return '<div style="margin-bottom:10px;">'
      + '<b>' + p.name + '</b>'
      + '<br><button onclick="removePlant(' + i + ')">Remove</button>'
      + '</div>';
  }).join('');
}

window.addPlant = function () {
  const input = document.getElementById('f-name');
  if (!input || !input.value.trim()) return;

  S.plants.push({ name: input.value.trim() });
  input.value = '';
  save();
  renderGarden();
};

window.removePlant = function (i) {
  S.plants.splice(i, 1);
  save();
  renderGarden();
};

window.switchPanel = function (id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('panel-' + id);
  if (el) el.classList.add('active');
};


// ✅ FIXED INIT (this was your main bug)
window.addEventListener('DOMContentLoaded', () => {
  load();
  renderGarden();
});

})();
</script>

</body>
</html>
